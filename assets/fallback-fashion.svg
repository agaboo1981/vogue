<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Fashion Placeholder</title>
  <desc id="desc">Elegant neutral placeholder image used when product photos are unavailable.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe8"/>
      <stop offset="100%" stop-color="#e4d6c8"/>
    </linearGradient>
    <linearGradient id="shape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1600" fill="url(#panel)"/>
  <circle cx="1000" cy="220" r="220" fill="#f43f5e" fill-opacity="0.12"/>
  <circle cx="170" cy="1400" r="280" fill="#111827" fill-opacity="0.08"/>
  <g transform="translate(240 320)">
    <rect x="100" y="180" width="520" height="740" rx="250" fill="url(#shape)"/>
    <circle cx="360" cy="120" r="120" fill="#111827"/>
    <rect x="80" y="420" width="560" height="74" rx="37" fill="#f9fafb" fill-opacity="0.35"/>
    <rect x="130" y="560" width="460" height="52" rx="26" fill="#f9fafb" fill-opacity="0.2"/>
    <rect x="160" y="660" width="400" height="52" rx="26" fill="#f9fafb" fill-opacity="0.18"/>
  </g>
  <text x="600" y="1420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="78" fill="#111827" fill-opacity="0.78">VOGUE.</text>
  <text x="600" y="1490" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" letter-spacing="8" fill="#374151" fill-opacity="0.68">IMAGE CURRENTLY UNAVAILABLE</text>
</svg>
